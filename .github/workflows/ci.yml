name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-unknown-linux-gnu

      - name: Build (x86_64)
        run: cargo build --release --verbose

      - name: Test
        run: cargo test --verbose

      # Compile-check the aarch64 path (raw syscalls in src/sys.rs) without a
      # cross linker.
      - name: Check (aarch64)
        run: cargo check --target aarch64-unknown-linux-gnu --verbose

      # Lints are informational for now: they run and surface results but do not
      # fail the build, so the badge reflects "does it build and pass tests".
      - name: Rustfmt
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
        continue-on-error: true
