name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: aarch64-unknown-linux-gnu, riscv64gc-unknown-linux-gnu, loongarch64-unknown-linux-gnu

      - name: Build (x86_64)
        run: cargo build --release --verbose

      - name: Test
        run: cargo test --verbose

      # Compile-check the non-x86_64 syscall paths (src/sys.rs) without a cross linker.
      - name: Check (aarch64)
        run: cargo check --target aarch64-unknown-linux-gnu --verbose

      - name: Check (riscv64)
        run: cargo check --target riscv64gc-unknown-linux-gnu --verbose

      - name: Check (loongarch64)
        run: cargo check --target loongarch64-unknown-linux-gnu --verbose

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  # Real macOS runs on both architectures: build, test, then execute the
  # binary and assert the darwin detection paths actually produce output.
  # macos-latest = arm64 (Apple Silicon); macos-26-intel = x86_64.
  macos:
    strategy:
      matrix:
        runner: [macos-latest, macos-26-intel]
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Build (release)
        run: cargo build --release --verbose

      - name: Test
        run: cargo test --verbose

      # The ubuntu job never compiles the darwin cfg paths; lint them here.
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run and check output
        run: |
          ./target/release/purefetch --no-config
          ./target/release/purefetch --no-config --no-color --logo none | tee out.txt
          grep -E "^OS +macOS" out.txt
          grep -E "^Kernel +Darwin " out.txt
          grep -E "^Memory +[0-9.]+ [GM]iB / [0-9.]+ GiB" out.txt
          grep -E "^Disk \(/\) +[0-9.]+ [GT]iB / [0-9.]+ [GT]iB" out.txt
          grep -E "^Uptime +" out.txt
          grep -E "^DE +Aqua" out.txt
          grep -E "^WM +Quartz Compositor" out.txt
          grep -E "^Shell +" out.txt
          grep -E "^CPU +" out.txt

  # Prove the declared MSRV for real: build and test on the oldest supported
  # toolchain (this also requires Cargo.lock to stay in the v3 format).
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.70"

      - name: Check (MSRV 1.70)
        run: cargo check --verbose

      - name: Test (MSRV 1.70)
        run: cargo test --verbose
